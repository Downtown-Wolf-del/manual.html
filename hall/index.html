        <h2>1. カウンターのお出迎え（鉄則）</h2>
        <p>カウンタースタッフの声出しに、ホールスタッフは必ず反応して外へお出迎えに行きます！</p>

        <p>人数やお客様の特性（足の具合など）に合わせてベストな席へご案内します。</p>
