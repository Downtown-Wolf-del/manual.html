<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト提出と出勤時のルール | 下町ウルフ</title>
    <style>
        body { 
            margin: 0; 
            padding: 50px 20px; 
            font-family: 'Helvetica Neue', sans-serif; 
            text-align: center; 
            /* 背景は共通のもの（文字が読みやすいよう暗めに設定） */
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('../2025_10_24_ウルフB-31.jpg');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: #fff; 
            min-height: 100vh;
        }
        
        h1 { 
            font-size: 2.2rem; 
            color: #c5a059; /* ウルフゴールド */
            margin-bottom: 30px; 
            border-bottom: 2px solid #c5a059;
            display: inline-block;
            padding-bottom: 10px;
        }

        /* コンテンツを囲むメインの箱 */
        .content-box {
            max-width: 700px;
            margin: 0 auto 40px auto;
            background: rgba(51, 51, 51, 0.85);
            padding: 40px 30px;
            border-radius: 15px;
            text-align: left; /* 文章は左詰めで読みやすく */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 各ルールのセクション */
        .rule-section {
            margin-bottom: 35px;
        }
        .rule-section:last-child {
            margin-bottom: 0;
        }

        /* 小見出し */
        h2 {
            font-size: 1.4rem;
            color: #fff;
            background: linear-gradient(45deg, #1e3c72, #2a5298); /* ディープブルー */
            padding: 10px 15px;
            border-radius: 6px;
            margin-top: 0;
            margin-bottom: 15px;
            border-left: 5px solid #c5a059;
        }

        /* 本文のテキスト */
        p {
            font-size: 1.05rem;
            line-height: 1.8;
            margin: 0;
            color: #e0e0e0;
        }

        /* 強調文字 */
        .highlight {
            color: #ffdd67; /* 目立つイエロー */
            font-weight: bold;
            font-size: 1.15rem;
        }
        .alert {
            color: #ff6b6b; /* 注意用のレッド */
            font-weight: bold;
        }

        /* 戻るボタン */
        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            border: 1px solid #fff;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #fff;
            color: #000;
        }

        /* スマホ対応 */
        @media (max-width: 600px) {
            body { padding: 30px 15px; }
            h1 { font-size: 1.8rem; }
            .content-box { padding: 25px 20px; }
            h2 { font-size: 1.2rem; }
            p { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <h1>シフト提出と出勤時のルール</h1>

    <div class="content-box">
        <div class="rule-section">
            <h2>◆ シフト提出</h2>
            <p>
                下町ウルフは<span class="highlight">2週間ごとのシフト制</span>です。<br>
                無理のないスケジュールを組むため、対象期間の<span class="highlight">「5〜6日前」まで</span>に希望を提出してください。
            </p>
        </div>

        <div class="rule-section">
            <h2>◆ 出勤時</h2>
            <p>
                <span class="alert">時間厳守！</span><br>
                余裕を持って準備し、最高の状態で笑顔でお客様をお迎えしましょう！
            </p>
        </div>
    </div>

    <a href="index.html" class="back-btn">← ウルフのルール一覧に戻る</a>

</body>
</html>
